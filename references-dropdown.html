<script>
document.addEventListener("DOMContentLoaded", function () {
  // Find the page-level bibliography container generated by Quarto/Pandoc
  var refs = document.getElementById("refs");
  if (!refs) {
    return;
  }

  // Avoid double-wrapping if script runs more than once
  if (refs.closest(".cha-references-callout")) {
    return;
  }

  // Create outer callout wrapper to match existing Source dropdown cards
  var callout = document.createElement("div");
  callout.className = "callout callout-style-default callout-note callout-titled cha-references-callout";

  // Header with Bootstrap collapse toggle attributes
  var header = document.createElement("button");
  header.type = "button";
  header.className = "callout-header d-flex align-content-center collapsed w-100 text-start border-0 bg-transparent";
  header.setAttribute("data-bs-toggle", "collapse");
  header.setAttribute("data-bs-target", ".cha-references-contents");
  header.setAttribute("aria-expanded", "false");
  header.setAttribute("aria-controls", "cha-references");
  header.setAttribute("aria-label", "Toggle references");

  var iconContainer = document.createElement("div");
  iconContainer.className = "callout-icon-container";
  var icon = document.createElement("i");
  icon.className = "callout-icon";
  iconContainer.appendChild(icon);

  var titleContainer = document.createElement("div");
  titleContainer.className = "callout-title-container flex-fill";

  var srOnly = document.createElement("span");
  srOnly.className = "screen-reader-only";
  srOnly.textContent = "Note";

  var titleText = document.createTextNode("References");

  titleContainer.appendChild(srOnly);
  titleContainer.appendChild(titleText);

  var toggleBtn = document.createElement("div");
  toggleBtn.className = "callout-btn-toggle d-inline-block border-0 py-1 ps-1 pe-0 float-end";
  var toggleIcon = document.createElement("i");
  toggleIcon.className = "callout-toggle";
  toggleBtn.appendChild(toggleIcon);

  header.appendChild(iconContainer);
  header.appendChild(titleContainer);
  header.appendChild(toggleBtn);

  // Collapsible body container
  var bodyContainerOuter = document.createElement("div");
  bodyContainerOuter.id = "cha-references";
  bodyContainerOuter.className = "cha-references-contents callout-collapse collapse";

  var bodyInner = document.createElement("div");
  bodyInner.className = "callout-body-container callout-body";

  // Move the existing refs list inside the body
  bodyInner.appendChild(refs);
  bodyContainerOuter.appendChild(bodyInner);

  callout.appendChild(header);
  callout.appendChild(bodyContainerOuter);

  // Insert the callout near the bottom of the content, before page navigation if present
  var pageNav = document.querySelector("nav.page-navigation");
  if (pageNav && pageNav.parentNode) {
    pageNav.parentNode.insertBefore(callout, pageNav);
  } else if (refs.parentNode) {
    refs.parentNode.insertBefore(callout, refs);
  } else {
    document.body.appendChild(callout);
  }
});
</script>
