project:
  type: book
  output-dir: docs
  execute-dir: project
  resources:
    - "pdfs/**"
  pre-render:
    - python3 scripts/generate_chapter_objects.py --chapter "chapters/04-Social and Physical Determinants of Health.qmd" --output-dir "chapters/_generated/objects" --strict-refs
    - python3 scripts/generate_chapter_objects.py --chapter "chapters/07-health-indicators.qmd" --output-dir "chapters/_generated/objects" --strict-refs

lang: en

book:
  title: "Mid-Hudson Regional Community Health Assessment 2025"
  subtitle: "Mid-Hudson Regional CHA"
  author: "Mid-Hudson Regional CHA"
  chapters:
    - index.qmd
    - chapters/00-acknowledgements.qmd
    - chapters/00-contact-information.qmd
    - chapters/01-excutive_summary.qmd
    - chapters/01-introduction.qmd
    - chapters/02-area-being-assessed.qmd
    - chapters/03-demographics.qmd
    - chapters/04-Social and Physical Determinants of Health.qmd
    - chapters/05-Mid-Hudson Community Partner Survey.qmd
    - chapters/06-health-behaviors.qmd
    - chapters/07-health-indicators.qmd
    - chapters/08-Behavioral-Health.qmd
    - chapters/09-Child-Health.qmd
    - chapters/10-Environmental Indicators.qmd
    - chapters/11-County-Health-Summaries.qmd
    - chapters/12-Appendices.qmd
  sidebar:
    style: docked
    search: true
    collapse-level: 2

bibliography: references.bib
csl: https://www.zotero.org/styles/vancouver
reference-location: section

format:
  html:
    theme:
      - default
      - theme.scss
    css: custom-citation-styles.css
    include-in-header: includes/skip-link-head.html
    include-before-body: includes/skip-to-main.html
    include-after-body: references-dropdown.html
    toc: true
    toc-depth: 3
    page-layout: full
    code-fold: true
    code-tools: true
    number-sections: true
    smooth-scroll: false
    fig-cap-location: top
    tbl-cap-location: top

execute:
  freeze: false
